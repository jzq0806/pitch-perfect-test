<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Pitch Perfect</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .dashboard-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .dashboard-header {
            text-align: center;
            margin-bottom: 50px;
        }

        .dashboard-header h1 {
            font-size: 42px;
            margin-bottom: 10px;
        }

        .dashboard-header p {
            font-size: 18px;
            opacity: 0.8;
        }

        .stats-overview {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            margin-bottom: 50px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            transition: transform 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-card-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .stat-card-value {
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .stat-card-label {
            font-size: 16px;
            opacity: 0.8;
        }

        .history-section {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 30px;
        }

        .history-section h2 {
            font-size: 28px;
            margin-bottom: 30px;
            text-align: center;
        }

        .history-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .history-item {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.3s;
        }

        .history-item:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .history-info {
            flex: 1;
        }

        .history-level {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .history-date {
            font-size: 14px;
            opacity: 0.7;
        }

        .history-score {
            font-size: 32px;
            font-weight: bold;
            margin-right: 20px;
        }

        .no-history {
            text-align: center;
            padding: 40px;
            opacity: 0.7;
        }

        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 40px;
        }

        .btn-primary {
            padding: 18px 50px;
            font-size: 18px;
            font-weight: bold;
            background: #4a90e2;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary:hover {
            background: #357abd;
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .btn-secondary {
            padding: 18px 50px;
            font-size: 18px;
            font-weight: bold;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="nav-left">
            <span class="logo">⚡ PITCH PERFECT</span>
            <a href="dashboard.html" class="nav-link">DASHBOARD</a>
        </div>
        <div class="nav-right">
            <a href="#" class="nav-link">SIGN UP</a>
            <a href="#" class="nav-link">LOGIN</a>
        </div>
    </nav>

    <!-- Dashboard 内容 -->
    <div class="dashboard-container">
        <div class="dashboard-header">
            <h1>📊 Dashboard</h1>
            <p>查看你的音感测试统计数据</p>
        </div>

        <!-- 统计概览 -->
        <div class="stats-overview">
            <div class="stat-card">
                <div class="stat-card-icon">🎯</div>
                <div class="stat-card-value" id="totalTests">0</div>
                <div class="stat-card-label">总测试次数</div>
            </div>
            <div class="stat-card">
                <div class="stat-card-icon">✅</div>
                <div class="stat-card-value" id="avgAccuracy">0%</div>
                <div class="stat-card-label">平均正确率</div>
            </div>
            <div class="stat-card">
                <div class="stat-card-icon">⏱️</div>
                <div class="stat-card-value" id="avgResponseTime">0s</div>
                <div class="stat-card-label">平均反应时间</div>
            </div>
            <div class="stat-card">
                <div class="stat-card-icon">🏆</div>
                <div class="stat-card-value" id="bestScore">0%</div>
                <div class="stat-card-label">最佳成绩</div>
            </div>
        </div>

        <!-- 历史记录 -->
        <div class="history-section">
            <h2>📜 测试历史</h2>
            <div class="history-list" id="historyList">
                <div class="no-history">暂无测试记录</div>
            </div>
        </div>

        <!-- 操作按钮 -->
        <div class="action-buttons">
            <button class="btn-primary" onclick="window.location.href='index.html'">开始新测试</button>
            <button class="btn-secondary" onclick="clearHistory()">清除历史记录</button>
        </div>
    </div>

    <script src="js/dashboard.js"></script>
</body>
</html>
